name: CI workflow 
on:
    push:
      branches: "main"  
    pull_request:
       branches: "main""

jobs: 
  build: 
    runs-on: ubuntu-latest
    container: python:3.9-slim
    steps:
      - name: Checkout
        uses: actions/checkoutv3
      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        run: |
          flake8 service --count --select=E9,F63,F7,F82 --show-source --statics
          flak8 servie --count --max-complexity=10 --max-line-length=127 --statistics 
      - name: Run unit tests with nose 
        run:  nosetests -v --with-spec-color --with-coverage --coverage-package=app

